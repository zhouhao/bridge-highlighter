<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Notes - Shark Eagle</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      height: 100vh;
      overflow: hidden;
      color: #333;
    }

    .app {
      display: flex;
      width: 100%;
      height: 100vh;
    }

    /* ── Left sidebar: Categories ── */
    .sidebar {
      width: 220px;
      min-width: 180px;
      background: #f5f5f5;
      border-right: 1px solid #e0e0e0;
      display: flex;
      flex-direction: column;
      user-select: none;
    }

    .sidebar-header {
      padding: 14px 16px;
      font-weight: 600;
      font-size: 13px;
      text-transform: uppercase;
      letter-spacing: 0.5px;
      color: #666;
      border-bottom: 1px solid #e0e0e0;
      display: flex;
      justify-content: space-between;
      align-items: center;
    }

    .sidebar-list {
      flex: 1;
      overflow-y: auto;
      padding: 6px 0;
    }

    .category-item {
      padding: 9px 16px;
      cursor: pointer;
      display: flex;
      align-items: center;
      gap: 8px;
      font-size: 14px;
      border-left: 3px solid transparent;
      transition: background 0.1s;
      position: relative;
    }

    .category-item:hover { background: #eaeaea; }

    .category-item.active {
      background: #e2e2e2;
      border-left-color: #4f8cff;
      font-weight: 500;
    }

    .category-item .category-icon { font-size: 15px; flex-shrink: 0; }

    .category-item .category-name {
      flex: 1;
      overflow: hidden;
      text-overflow: ellipsis;
      white-space: nowrap;
    }

    .category-item .category-count {
      font-size: 11px;
      color: #999;
      background: #e0e0e0;
      padding: 1px 6px;
      border-radius: 8px;
      flex-shrink: 0;
    }

    .category-item .category-actions {
      display: none;
      gap: 2px;
      flex-shrink: 0;
    }

    .category-item:hover .category-actions { display: flex; }
    .category-item:hover .category-count { display: none; }

    .category-action-btn {
      background: none;
      border: none;
      cursor: pointer;
      padding: 2px 4px;
      border-radius: 3px;
      font-size: 12px;
      color: #888;
      line-height: 1;
    }

    .category-action-btn:hover { background: #d0d0d0; color: #333; }

    .sidebar-footer {
      padding: 8px;
      border-top: 1px solid #e0e0e0;
    }

    .add-category-btn {
      width: 100%;
      padding: 8px;
      background: none;
      border: 1px dashed #ccc;
      border-radius: 6px;
      cursor: pointer;
      font-size: 13px;
      color: #888;
      transition: all 0.15s;
    }

    .add-category-btn:hover {
      background: #e8e8e8;
      border-color: #aaa;
      color: #555;
    }

    /* ── Middle panel: Notes list ── */
    .notes-panel {
      width: 300px;
      min-width: 240px;
      border-right: 1px solid #e0e0e0;
      display: flex;
      flex-direction: column;
      background: #fafafa;
    }

    .notes-header {
      padding: 12px 16px;
      border-bottom: 1px solid #e0e0e0;
      display: flex;
      justify-content: space-between;
      align-items: center;
      background: white;
    }

    .notes-header-title {
      font-size: 15px;
      font-weight: 600;
      color: #333;
      overflow: hidden;
      text-overflow: ellipsis;
      white-space: nowrap;
    }

    .notes-search {
      padding: 8px 12px;
      border-bottom: 1px solid #e0e0e0;
    }

    .notes-search input {
      width: 100%;
      padding: 6px 10px;
      border: 1px solid #ddd;
      border-radius: 6px;
      font-size: 13px;
      outline: none;
      background: white;
    }

    .notes-search input:focus { border-color: #4f8cff; }

    .add-note-btn {
      background: none;
      border: none;
      cursor: pointer;
      font-size: 20px;
      color: #4f8cff;
      padding: 2px 6px;
      border-radius: 4px;
      line-height: 1;
    }

    .add-note-btn:hover { background: #e8f0ff; }
    .add-note-btn:disabled { opacity: 0.3; cursor: not-allowed; }

    .notes-list {
      flex: 1;
      overflow-y: auto;
    }

    .note-item {
      padding: 12px 16px;
      cursor: pointer;
      border-bottom: 1px solid #f0f0f0;
      border-left: 3px solid transparent;
      transition: background 0.1s;
    }

    .note-item:hover { background: #f0f0f0; }

    .note-item.active {
      background: #e8f0ff;
      border-left-color: #4f8cff;
    }

    .note-item-title {
      font-size: 14px;
      font-weight: 500;
      margin-bottom: 3px;
      overflow: hidden;
      text-overflow: ellipsis;
      white-space: nowrap;
      color: #222;
    }

    .note-item-preview {
      font-size: 12px;
      color: #999;
      overflow: hidden;
      text-overflow: ellipsis;
      white-space: nowrap;
      line-height: 1.4;
    }

    .note-item-date {
      font-size: 11px;
      color: #bbb;
      margin-top: 4px;
    }

    .notes-empty {
      text-align: center;
      padding: 40px 20px;
      color: #bbb;
    }

    .notes-empty-icon { font-size: 40px; margin-bottom: 8px; }
    .notes-empty p { font-size: 13px; }

    /* ── Right panel: Editor ── */
    .editor-panel {
      flex: 1;
      display: flex;
      flex-direction: column;
      background: white;
      min-width: 0;
    }

    .editor-toolbar {
      padding: 8px 20px;
      border-bottom: 1px solid #e0e0e0;
      display: flex;
      justify-content: space-between;
      align-items: center;
      gap: 8px;
      flex-shrink: 0;
      background: #fafafa;
    }

    .toolbar-left { display: flex; gap: 4px; align-items: center; }
    .toolbar-right { display: flex; gap: 4px; align-items: center; }

    .toolbar-btn {
      padding: 5px 12px;
      border: 1px solid #ddd;
      background: white;
      border-radius: 5px;
      cursor: pointer;
      font-size: 13px;
      color: #555;
      transition: all 0.15s;
    }

    .toolbar-btn:hover { background: #f0f0f0; border-color: #ccc; }

    .toolbar-btn.active {
      background: #4f8cff;
      color: white;
      border-color: #4f8cff;
    }

    .toolbar-btn.danger { color: #e53935; border-color: #ffcdd2; }
    .toolbar-btn.danger:hover { background: #ffebee; }

    .editor-title-input {
      font-size: 22px;
      font-weight: 600;
      border: none;
      outline: none;
      padding: 18px 24px 6px;
      width: 100%;
      background: transparent;
      color: #1a1a1a;
    }

    .editor-title-input::placeholder { color: #ccc; }

    .editor-body {
      flex: 1;
      display: flex;
      flex-direction: column;
      overflow: hidden;
      position: relative;
    }

    .editor-textarea {
      width: 100%;
      height: 100%;
      border: none;
      outline: none;
      padding: 8px 24px 24px;
      font-family: 'SF Mono', 'Fira Code', 'Cascadia Code', 'Consolas', monospace;
      font-size: 14px;
      line-height: 1.7;
      resize: none;
      background: transparent;
      color: #333;
    }

    .editor-textarea::placeholder { color: #ccc; }

    .editor-preview {
      width: 100%;
      height: 100%;
      overflow-y: auto;
      padding: 8px 24px 24px;
    }

    .editor-empty {
      display: flex;
      align-items: center;
      justify-content: center;
      flex: 1;
      color: #ccc;
      font-size: 15px;
      flex-direction: column;
      gap: 8px;
    }

    .editor-empty-icon { font-size: 48px; }

    /* ── Highlight items (Page Highlights category) ── */
    .highlight-card {
      padding: 14px 16px;
      border: 1px solid #f0f0f0;
      border-radius: 8px;
      margin-bottom: 10px;
      background: #fafafa;
    }

    .highlight-card-text {
      padding: 6px 10px;
      border-radius: 4px;
      font-size: 14px;
      line-height: 1.5;
      margin-bottom: 8px;
      word-break: break-word;
    }

    .highlight-card-meta {
      display: flex;
      gap: 8px;
      align-items: center;
      flex-wrap: wrap;
    }

    .highlight-card-date {
      font-size: 11px;
      color: #aaa;
    }

    .highlight-card-comment {
      font-size: 13px;
      color: #666;
      font-style: italic;
      margin-bottom: 6px;
    }

    .highlight-card-tags {
      display: flex;
      gap: 4px;
      flex-wrap: wrap;
    }

    .highlight-tag {
      display: inline-block;
      background: #e3f2fd;
      color: #1976d2;
      padding: 1px 8px;
      border-radius: 10px;
      font-size: 11px;
    }

    .hl-yellow { background: #fff9c4; }
    .hl-red { background: #ffcdd2; }
    .hl-green { background: #c8e6c9; }
    .hl-lightBlue { background: #b3e5fc; }
    .hl-lightPurple { background: #e1bee7; }

    /* ── Markdown preview styles ── */
    .md-preview h1 { font-size: 28px; font-weight: 700; margin: 20px 0 12px; border-bottom: 1px solid #eee; padding-bottom: 8px; }
    .md-preview h2 { font-size: 22px; font-weight: 600; margin: 18px 0 10px; border-bottom: 1px solid #f0f0f0; padding-bottom: 6px; }
    .md-preview h3 { font-size: 18px; font-weight: 600; margin: 16px 0 8px; }
    .md-preview h4 { font-size: 16px; font-weight: 600; margin: 14px 0 6px; }
    .md-preview h5 { font-size: 14px; font-weight: 600; margin: 12px 0 6px; }
    .md-preview h6 { font-size: 13px; font-weight: 600; margin: 10px 0 4px; color: #666; }

    .md-preview p { margin: 0 0 12px; line-height: 1.7; }
    .md-preview a { color: #4f8cff; text-decoration: none; }
    .md-preview a:hover { text-decoration: underline; }
    .md-preview strong { font-weight: 600; }
    .md-preview em { font-style: italic; }
    .md-preview blockquote {
      border-left: 3px solid #ddd;
      padding: 8px 16px;
      margin: 0 0 12px;
      color: #666;
      background: #fafafa;
      border-radius: 0 4px 4px 0;
    }

    .md-preview ul, .md-preview ol { margin: 0 0 12px; padding-left: 24px; }
    .md-preview li { margin-bottom: 4px; line-height: 1.6; }

    .md-preview ul.contains-task-list {
      list-style: none;
      padding-left: 0;
    }

    .md-preview ul.contains-task-list li {
      display: flex;
      align-items: flex-start;
      gap: 8px;
    }

    .md-preview ul.contains-task-list input[type="checkbox"] {
      margin-top: 5px;
      cursor: pointer;
      width: 16px;
      height: 16px;
      flex-shrink: 0;
      accent-color: #4f8cff;
    }

    .md-preview pre {
      background: #1e1e2e;
      color: #cdd6f4;
      padding: 16px;
      border-radius: 8px;
      overflow-x: auto;
      margin: 0 0 12px;
      font-size: 13px;
      line-height: 1.5;
    }

    .md-preview code {
      font-family: 'SF Mono', 'Fira Code', 'Cascadia Code', monospace;
      font-size: 0.9em;
    }

    .md-preview :not(pre) > code {
      background: #f0f0f0;
      padding: 2px 6px;
      border-radius: 4px;
      color: #d63384;
    }

    .md-preview table {
      border-collapse: collapse;
      width: 100%;
      margin: 0 0 12px;
    }

    .md-preview th, .md-preview td {
      border: 1px solid #ddd;
      padding: 8px 12px;
      text-align: left;
    }

    .md-preview th { background: #f8f8f8; font-weight: 600; }

    .md-preview hr {
      border: none;
      border-top: 1px solid #e0e0e0;
      margin: 16px 0;
    }

    .md-preview img {
      max-width: 100%;
      border-radius: 6px;
    }

    .md-preview .mermaid {
      display: flex;
      justify-content: center;
      margin: 16px 0;
      background: #fafafa;
      padding: 16px;
      border-radius: 8px;
      border: 1px solid #eee;
    }

    /* ── Modal ── */
    .modal-overlay {
      display: none;
      position: fixed;
      inset: 0;
      background: rgba(0,0,0,0.4);
      z-index: 1000;
      align-items: center;
      justify-content: center;
    }

    .modal-overlay.active { display: flex; }

    .modal-box {
      background: white;
      border-radius: 10px;
      padding: 24px;
      width: 380px;
      max-width: 90%;
      box-shadow: 0 20px 60px rgba(0,0,0,0.2);
    }

    .modal-box h3 {
      font-size: 16px;
      margin-bottom: 16px;
      color: #222;
    }

    .modal-input {
      width: 100%;
      padding: 10px 12px;
      border: 1px solid #ddd;
      border-radius: 6px;
      font-size: 14px;
      outline: none;
      margin-bottom: 16px;
    }

    .modal-input:focus { border-color: #4f8cff; }

    .modal-actions {
      display: flex;
      gap: 8px;
      justify-content: flex-end;
    }

    .modal-btn {
      padding: 8px 18px;
      border: none;
      border-radius: 6px;
      cursor: pointer;
      font-size: 13px;
      font-weight: 500;
      transition: all 0.15s;
    }

    .modal-btn-cancel {
      background: #f0f0f0;
      color: #555;
    }

    .modal-btn-cancel:hover { background: #e0e0e0; }

    .modal-btn-primary {
      background: #4f8cff;
      color: white;
    }

    .modal-btn-primary:hover { background: #3d7ae0; }

    .modal-btn-danger {
      background: #e53935;
      color: white;
    }

    .modal-btn-danger:hover { background: #c62828; }

    /* ── Page highlight URL header ── */
    .page-url-header {
      padding: 12px 24px;
      background: #f8f9fa;
      border-bottom: 1px solid #e0e0e0;
    }

    .page-url-header a {
      color: #4f8cff;
      text-decoration: none;
      font-size: 13px;
      word-break: break-all;
    }

    .page-url-header a:hover { text-decoration: underline; }

    /* ── Save indicator ── */
    .save-indicator {
      font-size: 12px;
      color: #aaa;
      padding: 2px 8px;
      border-radius: 4px;
      transition: all 0.2s;
    }

    .save-indicator.saving { color: #ff9800; }
    .save-indicator.saved { color: #4caf50; }

    /* ── Scrollbar ── */
    ::-webkit-scrollbar { width: 6px; }
    ::-webkit-scrollbar-track { background: transparent; }
    ::-webkit-scrollbar-thumb { background: #ddd; border-radius: 3px; }
    ::-webkit-scrollbar-thumb:hover { background: #ccc; }
  </style>
</head>
<body>
  <div class="app">
    <div class="sidebar">
      <div class="sidebar-header">
        <span>Categories</span>
      </div>
      <div class="sidebar-list" id="category-list"></div>
      <div class="sidebar-footer">
        <button class="add-category-btn" id="add-category-btn">+ New Category</button>
      </div>
    </div>

    <div class="notes-panel">
      <div class="notes-header">
        <span class="notes-header-title" id="notes-header-title">Notes</span>
        <button class="add-note-btn" id="add-note-btn" title="New Note" disabled>+</button>
      </div>
      <div class="notes-search">
        <input type="text" id="notes-search-input" placeholder="Search notes...">
      </div>
      <div class="notes-list" id="notes-list">
        <div class="notes-empty">
          <div class="notes-empty-icon">📂</div>
          <p>Select a category</p>
        </div>
      </div>
    </div>

    <div class="editor-panel">
      <div class="editor-toolbar" id="editor-toolbar" style="display: none;">
        <div class="toolbar-left">
          <button class="toolbar-btn active" id="btn-edit">Edit</button>
          <button class="toolbar-btn" id="btn-preview">Preview</button>
        </div>
        <div class="toolbar-right">
          <span class="save-indicator" id="save-indicator"></span>
          <button class="toolbar-btn danger" id="btn-delete-note">Delete</button>
        </div>
      </div>
      <input type="text" class="editor-title-input" id="note-title" placeholder="Untitled Note" style="display: none;">
      <div class="editor-body" id="editor-body">
        <div class="editor-empty" id="editor-empty">
          <div class="editor-empty-icon">📝</div>
          <p>Select or create a note to get started</p>
        </div>
        <textarea class="editor-textarea" id="editor-textarea" placeholder="Start writing... (supports Markdown, Mermaid diagrams, and checklists)" style="display: none;"></textarea>
        <div class="editor-preview md-preview" id="editor-preview" style="display: none;"></div>
      </div>
    </div>
  </div>

  <div class="modal-overlay" id="modal-overlay">
    <div class="modal-box">
      <h3 id="modal-title">New Category</h3>
      <input type="text" class="modal-input" id="modal-input" placeholder="Category name">
      <div class="modal-actions">
        <button class="modal-btn modal-btn-cancel" id="modal-cancel">Cancel</button>
        <button class="modal-btn modal-btn-primary" id="modal-confirm">Create</button>
      </div>
    </div>
  </div>

  <script type="module" src="./main.ts"></script>
</body>
</html>
